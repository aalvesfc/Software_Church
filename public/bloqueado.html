<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hug Software — Acesso Bloqueado</title>
  <link rel="icon" type="image/png" href="/IMG/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #9156F1;
      --primary-dark: #7340D4;
      --dark:         #201E4B;
      --danger:       #E85D6A;
      --white:        #FFFFFF;
    }

    html, body {
      height: 100%;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--dark) 0%, #3B1F8C 45%, var(--primary) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Blobs decorativos */
    body::before, body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      opacity: 0.12;
      pointer-events: none;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--white);
      top: -180px; right: -120px;
    }
    body::after {
      width: 340px; height: 340px;
      background: var(--white);
      bottom: -120px; left: -80px;
    }

    /* Card glassmorphism */
    .card {
      position: relative; z-index: 1;
      width: min(480px, 100%);
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 28px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.30);
      animation: fadeUp .45s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo row */
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 36px;
    }
    .logo-mark {
      width: 36px; height: 36px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 10px;
      display: grid; place-items: center;
    }
    .logo-mark svg { width: 18px; height: 18px; color: var(--white); }
    .logo-name {
      font-size: 16px; font-weight: 700;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: -0.2px;
    }

    /* Ícone cadeado */
    .lock-wrap {
      width: 72px; height: 72px;
      background: rgba(232, 93, 106, 0.2);
      border: 1.5px solid rgba(232, 93, 106, 0.4);
      border-radius: 50%;
      display: grid; place-items: center;
      margin: 0 auto 24px;
    }
    .lock-wrap svg { width: 32px; height: 32px; color: #FF8F9A; }

    /* Textos */
    h1 {
      font-size: 26px; font-weight: 800;
      color: var(--white);
      letter-spacing: -0.04em;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .msg {
      font-size: 15px; font-weight: 400;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .msg strong { color: rgba(255, 255, 255, 0.88); font-weight: 600; }

    /* Badge do código */
    .code-badge {
      display: inline-block;
      font-size: 11px; font-weight: 700;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 100px;
      padding: 4px 12px;
      margin-bottom: 20px;
    }

    /* Botões */
    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 50px;
      background: #25D366;
      color: var(--white);
      text-decoration: none;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .18s, transform .12s;
    }
    .btn-whatsapp:hover  { opacity: .92; }
    .btn-whatsapp:active { transform: scale(.98); }
    .btn-whatsapp svg { width: 20px; height: 20px; flex-shrink: 0; }

    .btn-logout {
      width: 100%; height: 46px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.65);
      cursor: pointer;
      transition: background .18s, color .18s;
    }
    .btn-logout:hover { background: rgba(255, 255, 255, 0.14); color: var(--white); }

    /* Rodapé */
    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.30);
    }
  </style>
</head>
<body>

<div class="card">

  <div class="logo-row">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <span class="logo-name">Hug Software</span>
  </div>

  <div class="lock-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>

  <h1>Acesso Bloqueado</h1>
  <div class="code-badge" id="codeBadge"></div>
  <p class="msg" id="msgText"></p>

  <div class="btn-row">
    <a class="btn-whatsapp" id="btnWhatsApp" href="#" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347"/>
        <path d="M12.004 2.003a9.996 9.996 0 0 0-8.591 15.099L2 22l5.032-1.374A9.997 9.997 0 1 0 12.004 2.003z"/>
      </svg>
      Falar com a equipe
    </a>

    <button class="btn-logout" onclick="fazerLogout()">
      Sair da conta
    </button>
  </div>

  <div class="footer">
    Hug Software &mdash; Gestão de voluntários para igrejas
  </div>

</div>

<script>
  const MENSAGENS = {
    sem_contrato: {
      badge: 'Sem plano ativo',
      text:  'Sua igreja ainda não possui um <strong>plano ativo</strong>. Entre em contato com nossa equipe para contratar um plano e liberar o acesso completo.',
    },
    contrato_bloqueado: {
      badge: 'Contrato bloqueado',
      text:  'O acesso da sua igreja foi <strong>bloqueado por falta de pagamento</strong>. Entre em contato com nossa equipe para regularizar e reativar o sistema.',
    },
    modulo_nao_contratado: {
      badge: 'Módulo não disponível',
      text:  'Este módulo <strong>não está disponível no seu plano atual</strong>. Fale com nossa equipe para conhecer os planos disponíveis.',
    },
  }

  const DEFAULT = {
    badge: 'Acesso restrito',
    text:  'Sua igreja não possui acesso a este recurso. Entre em contato com nossa equipe para mais informações.',
  }

  const WA_NUMBER = '5511999999999'
  const WA_TEXT   = 'Olá, preciso de ajuda com meu plano no Hug Software.'

  ;(function init() {
    const params = new URLSearchParams(window.location.search)
    const code   = params.get('code') || ''
    const info   = MENSAGENS[code] || DEFAULT

    document.getElementById('codeBadge').textContent   = info.badge
    document.getElementById('msgText').innerHTML        = info.text
    document.getElementById('btnWhatsApp').href =
      `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(WA_TEXT)}`
  })()

  function fazerLogout() {
    localStorage.clear()
    window.location.href = '/'
  }
</script>

</body>
</html>
