<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hug Software — Login</title>
  <link rel="icon" type="image/png" href="/IMG/logo.png">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif !important; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:        #8B5CF6;
      --primary-light:  #DDD6FE;
      --primary-focus:  #8B5CF6;
      --ink:            #1d1d1f;
      --ink-muted:      #6e6e73;
      --ink-subtle:     #aeaeb2;
      --canvas:         #ffffff;
      --canvas-input:   #f2f2f7;
      --canvas-bg:      #f5f3ff;
      --panel-dark-1:   #ff5500;
      --panel-dark-2:   #8B5CF6;
      --panel-dark-3:   #8B5CF6;
      --on-dark:        #ffffff;
      --on-dark-muted:  rgba(255,255,255,0.65);
      --radius-sm:      8px;
      --radius-md:      14px;
      --radius-lg:      22px;
      --radius-pill:    9999px;
    }

    body {
      min-height: 100vh;
      background-color: var(--canvas-bg);
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Centering wrapper ── */
    .stage {
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Card ── */
    .card {
      display: flex;
      width: 100%;
      max-width: 960px;
      min-height: 520px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: rgba(0,0,0,0.10) 0 8px 40px 0, rgba(0,0,0,0.06) 0 2px 8px 0;
    }

    /* ── Left panel ── */
    .panel-left {
      flex: 0 0 42%;
      background: linear-gradient(145deg, var(--panel-dark-1) 0%, var(--panel-dark-2) 45%, var(--panel-dark-3) 100%);
      padding: 52px 44px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* decorative blobs */
    .panel-left::before,
    .panel-left::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      opacity: 0.18;
    }
    .panel-left::before {
      width: 300px; height: 300px;
      background: var(--primary-light);
      top: -80px; left: -80px;
    }
    .panel-left::after {
      width: 200px; height: 200px;
      background: var(--primary-light);
      bottom: -60px; right: -40px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 36px;
      position: relative;
      z-index: 1;
    }

    .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(145deg, var(--primary-light), var(--primary-focus));
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      box-shadow: rgba(0,0,0,0.22) 3px 5px 30px 0;
    }
    .logo-icon span {
      font-size: 26px;
      font-weight: 600;
      color: var(--on-dark);
      font-family: sans-serif;
      letter-spacing: -0.28px;
    }

    .brand-name {
      font-family: sans-serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--on-dark);
      letter-spacing: -0.374px;
      line-height: 1.14;
    }

    .brand-tagline {
      font-size: 14px;
      font-weight: 400;
      color: var(--on-dark-muted);
      line-height: 1.5;
      letter-spacing: -0.224px;
      max-width: 220px;
    }

    .features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .feature-icon {
      width: 34px; height: 34px;
      background: rgba(255,255,255,0.12);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .feature-icon svg {
      width: 18px; height: 18px;
      color: var(--primary-light);
    }

    .feature-label {
      font-size: 15px;
      font-weight: 400;
      color: var(--on-dark);
      letter-spacing: -0.224px;
    }

    /* ── Right panel ── */
    .panel-right {
      flex: 1;
      background: var(--canvas);
      padding: 56px 52px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-title {
      font-family: sans-serif;
      font-size: 34px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.374px;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .form-subtitle {
      font-size: 14px;
      font-weight: 400;
      color: var(--ink-muted);
      letter-spacing: -0.224px;
      line-height: 1.43;
      margin-bottom: 36px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }

    label {
      font-size: 14px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.224px;
    }

    .input-wrap { position: relative; }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      height: 44px;
      background: var(--canvas-input);
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      padding: 0 48px 0 16px;
      font-size: 17px;
      font-family: inherit;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.374px;
      outline: none;
      transition: border-color 0.15s ease, background 0.15s ease;
      appearance: none;
    }

    input:focus {
      border-color: var(--primary-focus);
      background: var(--canvas);
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: var(--ink-subtle);
      display: flex;
      align-items: center;
      transition: color 0.15s ease;
    }
    .toggle-pw:hover { color: var(--ink-muted); }
    .toggle-pw svg { width: 20px; height: 20px; }

    .row-forgot {
      display: flex;
      justify-content: flex-end;
      margin-top: -8px;
      margin-bottom: 28px;
    }

    .link-forgot {
      font-size: 14px;
      font-weight: 400;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: -0.224px;
      transition: opacity 0.15s ease;
    }
    .link-forgot:hover { opacity: 0.72; }

    .btn-primary {
      width: 100%;
      height: 52px;
      background: linear-gradient(90deg, #ff5500 0%, #8B5CF6 100%);
      border: none;
      border-radius: var(--radius-pill);
      font-family: inherit;
      font-size: 17px;
      font-weight: 600;
      color: var(--on-dark);
      letter-spacing: -0.374px;
      cursor: pointer;
      margin-bottom: 14px;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }
    .btn-primary:hover  { opacity: 0.92; }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
      width: 100%;
      height: 52px;
      background: transparent;
      border: 1.5px solid var(--primary);
      border-radius: var(--radius-pill);
      font-family: inherit;
      font-size: 17px;
      font-weight: 400;
      color: var(--primary);
      letter-spacing: -0.374px;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.15s ease;
    }
    .btn-secondary:hover  { background: rgba(10,110,110,0.06); }
    .btn-secondary:active { transform: scale(0.97); }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 16px 0;
      font-size: 13px; color: var(--ink-subtle); letter-spacing: -0.1px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #e0e0e0;
    }

    .btn-google {
      width: 100%; height: 52px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: #fff; border: 1.5px solid #e0e0e0;
      border-radius: var(--radius-pill);
      font-family: inherit; font-size: 15px; font-weight: 500;
      color: var(--ink); letter-spacing: -0.224px;
      cursor: pointer; transition: background 0.12s, box-shadow 0.12s;
      margin-bottom: 14px;
    }
    .btn-google:hover { background: #f7f7f7; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .btn-google:active { transform: scale(0.97); }
    .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* ── Responsive ── */
    @media (max-width: 760px) {
      body { padding: 20px 20px; }
      .card { flex-direction: column; min-height: unset; }
      .panel-left { flex: none; padding: 40px 32px; }
      .panel-right { padding: 40px 32px; }
    }
  </style>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="stage">
    <div class="card">

      <!-- Left panel -->
      <div class="panel-left">
        <div class="brand">
          <div class="logo-icon"><span>Z</span></div>
          <div class="brand-name">Hug App</div>
          <div class="brand-tagline">Sistema completo para gestão de voluntários e eventos da sua igreja.</div>
        </div>

        <ul class="features">
          <li class="feature-item">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </div>
            <span class="feature-label">Gestão de voluntários</span>
          </li>
          <li class="feature-item">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8"  y1="2" x2="8"  y2="6"/>
                <line x1="3"  y1="10" x2="21" y2="10"/>
              </svg>
            </div>
            <span class="feature-label">Escalas inteligentes</span>
          </li>
          <li class="feature-item">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
            </div>
            <span class="feature-label">Check-in com GPS</span>
          </li>
        </ul>
      </div>

      <!-- Right panel -->
      <div class="panel-right">
        <h1 class="form-title">Bem-vindo</h1>
        <p class="form-subtitle">Entre com suas credenciais para acessar</p>

        <form onsubmit="return false;">
          <div class="field">
            <label for="email">E-mail</label>
            <div class="input-wrap">
              <input type="email" id="email" placeholder="user@hug.com" autocomplete="email" />
            </div>
          </div>

          <div class="field">
            <label for="password">Senha</label>
            <div class="input-wrap">
              <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
              <button type="button" class="toggle-pw" aria-label="Mostrar senha" onclick="togglePw()">
                <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="row-forgot">
            <a href="#" class="link-forgot">Esqueceu a senha?</a>
          </div>

          <div id="msg-erro" style="display:none;margin-bottom:12px;padding:10px 14px;background:rgba(255,59,48,0.08);border-radius:10px;font-size:14px;color:#c0392b;letter-spacing:-0.224px;"></div>

          <button type="submit" class="btn-primary" id="btn-entrar" onclick="handleLogin()">Entrar</button>

          <div class="divider">ou</div>

          <button type="button" class="btn-google" id="btn-google" onclick="handleGoogle()">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
              <path fill="none" d="M0 0h48v48H0z"/>
            </svg>
            Entrar com Google
          </button>

        </form>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    // SEC-005: escape de HTML para prevenir XSS em innerHTML
    function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
    let supabaseClient = null

    async function initSupabase() {
      try {
        const cfg = await fetch('/api/auth/config').then(r => r.json())
        if (cfg.url && cfg.anon_key) {
          supabaseClient = supabase.createClient(cfg.url, cfg.anon_key)
        }
      } catch (_) {}
    }

    async function handleGoogle() {
      if (!supabaseClient) { mostrarErro('Google não disponível no momento.'); return }
      const btn = document.getElementById('btn-google')
      btn.disabled = true
      btn.textContent = 'Redirecionando…'
      await supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: `${location.origin}/login?oauth=google` }
      })
    }

    async function checkOAuthCallback() {
      if (!supabaseClient) return false
      if (!location.search.includes('oauth=google') && !location.search.includes('code=')) return false
      const { data: { session } } = await supabaseClient.auth.getSession()
      if (!session) return false
      await finalizarSessao(session)
      return true
    }

    async function finalizarSessao(session) {
      const res = await fetch('/api/auth/me', {
        headers: { Authorization: `Bearer ${session.access_token}` }
      })
      if (!res.ok) {
        history.replaceState(null, '', '/login')
        mostrarErro('Conta não encontrada no sistema. Solicite cadastro ao seu líder.')
        return
      }
      const { usuario, igreja } = await res.json()
      localStorage.setItem('access_token',    session.access_token)
      localStorage.setItem('refresh_token',   session.refresh_token)
      localStorage.setItem('expires_at',      session.expires_at)
      localStorage.setItem('usuario',         JSON.stringify(usuario))
      localStorage.setItem('igreja',          JSON.stringify(igreja))
      localStorage.setItem('permissions',     JSON.stringify(usuario.permissions || []))
      localStorage.setItem('perfil_slug',     usuario.perfil_slug || '')
      localStorage.setItem('permissions_at',  Date.now().toString())
      window.location.href = '/dashboard'
    }

    function togglePw() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eye-icon');
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      icon.innerHTML = show
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('password').value;
      const btn   = document.getElementById('btn-entrar');
      const erro  = document.getElementById('msg-erro');

      erro.style.display = 'none';

      if (!email || !senha) {
        mostrarErro('Preencha e-mail e senha.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Entrando…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });

        const dados = await res.json();

        if (!res.ok) {
          mostrarErro(dados.error || 'Erro ao fazer login.');
          return;
        }

        console.log('[login frontend] dados recebidos:', dados.usuario.perfil_slug, dados.usuario.permissions)
        localStorage.setItem('access_token',    dados.access_token);
        localStorage.setItem('refresh_token',   dados.refresh_token);
        localStorage.setItem('expires_at',      dados.expires_at);
        localStorage.setItem('usuario',         JSON.stringify(dados.usuario));
        localStorage.setItem('igreja',          JSON.stringify(dados.igreja));
        localStorage.setItem('permissions',     JSON.stringify(dados.usuario.permissions || []));
        localStorage.setItem('perfil_slug',     dados.usuario.perfil_slug || '');
        localStorage.setItem('permissions_at',  Date.now().toString());
        window.location.href = '/dashboard';

      } catch {
        mostrarErro('Não foi possível conectar ao servidor.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }

    function mostrarErro(msg) {
      const erro = document.getElementById('msg-erro');
      erro.textContent = msg;
      erro.style.display = 'block';
    }

    // Inicializa e verifica callback OAuth
    ;(async () => {
      await initSupabase()
      const isOAuth = await checkOAuthCallback()
      if (!isOAuth && localStorage.getItem('access_token')) {
        window.location.href = '/dashboard'
      }
    })()
  </script>

</body>
</html>
